# Egregore Node Configuration
#
# CLI flags override values in this file.
# Delete or comment out any field to use its default.

# Data directory for identity and database.
# Default: ./data
data_dir: ./data

# HTTP API port (localhost only).
# Default: 7654
port: 7654

# Enable HTTP API server (REST + SSE + optional MCP endpoint).
# Default: true
api_enabled: true

# Require Bearer token auth for mutating REST endpoints under /v1.
# Read-only routes remain accessible without auth.
# Compatibility default: false
api_auth_enabled: false

# Bearer token required when api_auth_enabled is true.
# Example: "change-me-local-api-token"
# api_auth_token: "change-me-local-api-token"

# Enable MCP endpoint at POST /mcp on the HTTP API port.
# Ignored if api_enabled is false.
# Default: true
mcp_enabled: true

# Gossip TCP port (binds to all interfaces).
# Default: 7655
gossip_port: 7655

# Seconds between gossip sync cycles.
# Default: 300 (5 minutes)
gossip_interval_secs: 300

# Network key for isolation. Nodes with different keys cannot communicate.
# REQUIRED: You must change this value before the node will start.
#
# Examples:
#   network_key: "my-home-lab"           # Private network
#   network_key: "acme-corp-internal"    # Team/org network
#   network_key: "egregore-public-v1"    # Join public federation
network_key: CHANGE_ME

# IP address to bind gossip server to.
# Default: 127.0.0.1 (loopback only - local development)
#
# Set to 0.0.0.0 to accept connections from external peers.
gossip_bind: "127.0.0.1"

# Enable strict schema validation.
# When true, messages with unknown content type/schema are rejected at publish/ingest.
# Default: false
schema_strict: false

# Enable UDP LAN peer discovery.
# Default: false
lan_discovery: false

# UDP port for LAN discovery broadcasts.
# Default: 7656
discovery_port: 7656

# Enable mDNS/Bonjour peer discovery.
# Works across tailnets and networks where UDP broadcast doesn't propagate.
# Discoverable via `dns-sd -B _egregore._tcp` or `avahi-browse`.
# Default: false
mdns_discovery: false

# mDNS service type for peer discovery.
# Default: _egregore._tcp.local.
mdns_service: "_egregore._tcp.local."

# Static peer addresses for gossip replication.
# Merged with peers discovered via LAN and stored in the database.
# CLI --peer flags append to this list.
# Format: host:port
#
# Example:
# peers:
#   - 192.168.1.100:7655
#   - relay.example.com:7661
peers: []

# Hook definitions. Each hook fires independently on message events.
# Hooks run in parallel. Each can have its own timeout.
# CLI --hook-on-message/--hook-webhook-url append an additional hook.
#
# Hook fields:
#   name:             Human-readable label (used as idempotency key)
#   on_message:       Path to subprocess script (message JSON on stdin)
#   webhook_url:      URL to POST message JSON
#   timeout_secs:     Execution timeout (default: 30)
#   max_retries:      Retry count for failures/timeouts (default: 0 = no retries)
#   retry_delay_secs: Delay between retries (default: 5)
#   idempotent:       Track completion to skip duplicates (default: false)
#
# Example:
# hooks:
#   - name: discord-notify
#     on_message: ./hooks/discord-notify.sh
#     timeout_secs: 10
#   - name: insight-webhook
#     webhook_url: https://example.com/hooks/egregore
#     timeout_secs: 15
#   - name: reliable-pipeline
#     on_message: ./hooks/process.sh
#     webhook_url: https://example.com/hooks/backup
#     timeout_secs: 30
#     max_retries: 3
#     retry_delay_secs: 10
#     idempotent: true
hooks: []

# Push-based replication settings.
# When enabled, connections attempt to negotiate persistent mode for
# real-time message propagation (in addition to periodic pull sync).

# Enable persistent push connections.
# Default: true
push_enabled: true

# Maximum number of persistent connections to maintain.
# Applies to both incoming and outgoing persistent connections.
# Default: 32
max_persistent_connections: 32

# Initial delay for reconnection attempts (in seconds).
# Uses exponential backoff with jitter.
# Default: 5
reconnect_initial_secs: 5

# Maximum delay for reconnection attempts (in seconds).
# Default: 300 (5 minutes)
reconnect_max_secs: 300

# Flow control settings.
# Credit-based backpressure prevents fast publishers from overwhelming slow consumers.

# Enable credit-based flow control for push connections.
# Default: true
flow_control_enabled: true

# Initial credits granted to each peer connection.
# Each message consumes one credit; peers request more when low.
# Default: 100
flow_initial_credits: 100

# Maximum messages per second per peer (0 = unlimited).
# Rate limiting prevents bursts from overwhelming the receiver.
# Default: 100
flow_rate_limit_per_second: 100

# Retention and expiration settings.
# Messages can expire via per-message TTL (expires_at field) or retention policies.

# Enable automatic retention cleanup.
# When enabled, a background task periodically deletes expired messages
# and applies retention policies.
# Default: false
retention_enabled: false

# Publish periodic node_status messages with peer/storage/throughput metrics.
# Default: false
node_status_enabled: false

# Interval in seconds between retention cleanup runs.
# Default: 3600 (1 hour)
retention_interval_secs: 3600

# How long to keep tombstones (deleted message records) in seconds.
# Tombstones track deleted messages for replication consistency.
# Default: 604800 (7 days)
tombstone_max_age_secs: 604800

# Retention policies are configured via the HTTP API:
#
#   GET    /v1/retention/policies       - List all policies
#   POST   /v1/retention/policies       - Create a policy
#   DELETE /v1/retention/policies/:id   - Delete a policy
#
# Policy options:
#   scope:        "global" | {"topic": "name"} | {"author": "@id"} | {"content_type": "type"}
#   max_age_secs: Delete messages older than N seconds
#   max_count:    Keep only the N most recent messages (per scope)
#   max_bytes:    Keep only messages within N bytes total (per scope)
#   compact_key:  JSON path (e.g., "$.key") - keep only latest per unique value
#
# Examples:
#   curl -X POST http://localhost:7654/v1/retention/policies \
#     -d '{"scope":"global","max_age_secs":2592000}'
#
#   curl -X POST http://localhost:7654/v1/retention/policies \
#     -d '{"scope":{"topic":"logs"},"max_count":1000}'

# ---
# Metrics configuration.
# ---

# Prometheus metrics are exposed at a configurable HTTP endpoint.
# Scrape with Prometheus or any compatible metrics collector.
# Available metrics:
#   - egregore_messages_ingested_total{content_type, status}
#   - egregore_messages_replicated_total{direction}
#   - egregore_peers_connected
#   - egregore_replication_latency_seconds
#   - egregore_message_size_bytes
#   - egregore_db_size_bytes
metrics:
  # Enable metrics endpoint.
  # Default: true
  enabled: true

  # Address to bind the metrics server.
  # Default: 127.0.0.1:9090
  bind: "127.0.0.1:9090"

  # Path for the metrics endpoint (informational, served at root by prometheus exporter).
  # Default: /metrics
  path: "/metrics"

# ---
# Logging configuration.
# ---

# Logging output format.
# - json: Machine-readable JSON (recommended for production)
# - pretty: Human-readable format (recommended for development)
# Default: json
logging:
  format: json

  # Minimum log level (trace, debug, info, warn, error).
  # Can be overridden with RUST_LOG environment variable.
  # Default: info
  level: info

  # Include trace_id and span_id in log output for correlation.
  # Enables distributed tracing across components.
  # Default: true
  include_trace_ids: true

# ---
# OpenTelemetry OTLP trace export configuration.
# Requires building with `--features otlp` to enable.
# ---

# OTLP export sends spans to an OpenTelemetry collector for distributed tracing.
# Compatible with Jaeger, Grafana Tempo, Honeycomb, Datadog, etc.
#
# Example collector setup (Jaeger):
#   docker run -p 4317:4317 -p 16686:16686 jaegertracing/all-in-one:latest
#   # View traces at http://localhost:16686
#
# Semantic conventions used:
#   - service.name = configured service_name (default: "egregore")
#   - service.version = crate version from Cargo.toml
#   - messaging.system = "egregore"
otlp:
  # Enable OTLP trace export.
  # Default: false
  enabled: false

  # OTLP collector endpoint (gRPC).
  # Must be a valid URL with http, https, or grpc scheme.
  # Default: http://localhost:4317
  endpoint: "http://localhost:4317"

  # Service name for OpenTelemetry semantic conventions.
  # Use a unique name per node in multi-node deployments.
  # Default: egregore
  service_name: "egregore"

  # Trace sampling rate (0.0 to 1.0).
  # 1.0 = all traces, 0.1 = 10% of traces, 0.0 = no traces.
  # Lower values recommended for high-throughput production deployments.
  # Default: 1.0
  sample_rate: 1.0
